name: recovery_app
description: "التعافي من الٳدمان - Recovery from Addiction App"
publish_to: 'none'

version: 4.0.7+50

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.0.3
  
  # For Google Fonts
  google_fonts: ^8.1.0
  
  # For state management
  provider: ^6.1.1
  
  # For local storage
  shared_preferences: ^2.2.2
  cloud_firestore: ^5.6.12
  image_picker: ^1.1.2
  http: ^1.6.0
  firebase_storage: ^12.4.10
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  translator: ^1.0.0
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  
  # PDF Library - using webview for compatibility
  flutter_inappwebview: ^6.0.0
  file_picker: ^8.0.0+1
  path_provider: ^2.1.5
  crypto: ^3.0.3
  
  # For app lock with biometric
  local_auth: ^2.2.0
  scrollable_positioned_list: ^0.3.8
  universal_html: ^2.2.4
  audioplayers: ^6.4.0
  permission_handler: ^12.0.1
  record: 4.4.4
  cached_network_image: ^3.4.1
  dio: ^5.4.0
  html: ^0.15.4
  flutter_pdfview: ^1.3.2
  cloudflare: ^5.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/


